services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - INDEX_STORE_DIR=/app/data/index
      - DATASET_DIR=/app/new_dataset
      - ADMIN_INTERNAL_TOKEN=${ADMIN_INTERNAL_TOKEN}
    volumes:
      - ./new_dataset:/app/new_dataset
      - ./data/index:/app/data/index
      - ./data/db:/app/instance
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health/live', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BACKEND_URL=${BACKEND_URL:-http://backend:5000}
    ports:
      - "3001:3000"
    environment:
      - BACKEND_URL=${BACKEND_URL:-http://backend:5000}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3001}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ADMIN_INTERNAL_TOKEN=${ADMIN_INTERNAL_TOKEN}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000', res => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
